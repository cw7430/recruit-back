spring:
  application:
    name: recruit
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
  jackson:
    time-zone: UTC
    mapper:
      accept-case-insensitive-enums: true
  profiles:
    active: local

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html # 👉 OpenAPI JSON 문서 경로 (기본: /api-docs)
  api-docs:
    path: /api-docs  # 👉 Swagger UI 접속 경로 (기본: /swagger-ui/index.html)